<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Amortización y Tipos de Bonos · Renta Fija 2026-I</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0e1117;color:#e8e0d0;font-family:Georgia,serif;min-height:100vh;padding:36px 20px;}
  .mono{font-family:'DM Mono',monospace;}
  .serif{font-family:'Playfair Display',serif;}

  #app{max-width:740px;margin:0 auto;}

  .kicker{font-size:11px;letter-spacing:3px;color:#c9a96e;font-family:'DM Mono',monospace;margin-bottom:4px;}
  h1{font-family:'Playfair Display',serif;font-size:30px;font-weight:900;margin-bottom:4px;}
  .subtitle{color:#706860;font-size:14px;margin-bottom:28px;}

  /* Method buttons */
  .method-row{display:flex;gap:10px;margin-bottom:20px;}
  .method-btn{
    flex:1;padding:14px 12px;border-radius:10px;
    border:1px solid rgba(255,255,255,0.08);background:transparent;
    color:#706860;cursor:pointer;transition:all .18s;text-align:center;
    font-family:Georgia,serif;
  }
  .method-btn:hover{background:rgba(255,255,255,0.04);}
  .method-btn.active{border-color:var(--col);background:var(--col-bg);color:#e8e0d0;}
  .method-btn .m-icon{font-size:20px;margin-bottom:4px;}
  .method-btn .m-sub{font-size:12px;font-family:'DM Mono',monospace;margin-bottom:4px;}
  .method-btn .m-bond{font-size:13px;}
  .method-btn.active .m-sub{color:var(--col);}
  .method-btn.active .m-bond{font-weight:600;}

  /* View tabs */
  .view-tabs{display:flex;gap:8px;margin-bottom:18px;}
  .view-tab{
    padding:6px 16px;border-radius:20px;
    border:1px solid rgba(255,255,255,0.08);background:transparent;
    color:#706860;font-size:12px;font-family:'DM Mono',monospace;cursor:pointer;transition:all .15s;
  }
  .view-tab.active{background:var(--col);border-color:var(--col);color:#0e1117;font-weight:600;}

  /* Cards */
  .card{background:#13161e;border-radius:12px;border:1px solid rgba(255,255,255,0.06);padding:18px 20px;margin-bottom:14px;}
  .card-title{font-size:11px;letter-spacing:1.5px;color:#5a5248;font-family:'DM Mono',monospace;margin-bottom:10px;text-transform:uppercase;}

  /* Hero card */
  .hero-card{padding:18px 20px;border-radius:12px;margin-bottom:14px;}
  .hero-inner{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap;}
  .hero-col{}
  .hero-label{font-size:11px;font-family:'DM Mono',monospace;letter-spacing:1px;margin-bottom:4px;}
  .hero-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;}
  .hero-sub{font-size:12px;color:#9a9080;margin-top:2px;}
  .hero-arrow{font-size:28px;opacity:.5;margin:4px 8px;align-self:center;}
  .hero-note{margin-top:14px;padding:10px 14px;background:rgba(0,0,0,.2);border-radius:8px;font-size:13px;color:#b0a898;line-height:1.7;}
  .hero-formula{margin-top:10px;font-family:'DM Mono',monospace;font-size:12px;background:rgba(0,0,0,.25);border-radius:6px;padding:10px 14px;white-space:pre-line;}

  /* Feature row */
  .feature-row{display:flex;gap:10px;margin-bottom:14px;}
  .feature-box{flex:1;background:#13161e;border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:14px 16px;}

  /* Pros/cons grid */
  .pc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .pc-item{font-size:13px;color:#b0a898;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);}
  .pc-item:last-child{border-bottom:none;}

  /* Bar chart */
  .bar-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:16px;}
  .bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
  .bar-label-top{font-size:10px;font-family:'DM Mono',monospace;color:#706860;}
  .bar-container{width:100%;height:120px;display:flex;flex-direction:column;justify-content:flex-end;border-radius:4px;overflow:hidden;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);}
  .bar-principal{transition:height .4s ease;}
  .bar-interest{transition:height .4s ease;}

  .legend{display:flex;gap:14px;justify-content:center;margin-bottom:16px;}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#9a9080;}
  .legend-swatch{width:12px;height:12px;border-radius:2px;}

  .period-labels{display:flex;justify-content:space-between;margin-bottom:8px;padding-bottom:4px;}
  .period-label{flex:1;text-align:center;font-size:11px;font-family:'DM Mono',monospace;color:#5a5248;}

  /* Table */
  .table-sm{width:100%;border-collapse:collapse;font-family:'DM Mono',monospace;font-size:12px;}
  .table-sm th{background:rgba(255,255,255,.04);padding:6px 10px;text-align:right;color:#5a5248;font-size:10px;letter-spacing:.5px;}
  .table-sm th:first-child{text-align:left;}
  .table-sm td{padding:7px 10px;text-align:right;border-bottom:1px solid rgba(255,255,255,.04);color:#9a9080;}
  .table-sm td:first-child{text-align:left;color:#706860;}
  .table-sm tr:last-child td{border-bottom:none;}

  /* Tags */
  .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-family:'DM Mono',monospace;margin:3px;}

  /* Info note */
  .info-note{padding:12px 16px;background:#13161e;border-radius:8px;font-size:13px;color:#9a9080;line-height:1.7;margin-bottom:14px;}
  .info-note-label{font-family:'DM Mono',monospace;font-size:11px;}

  /* Comparison table row highlight */
  .cmp-active td:first-child{font-weight:600;}

  /* Fade animation */
  .fade-in{animation:fadeUp .3s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  .footer{margin-top:28px;font-size:11px;color:#2a2520;text-align:center;font-family:'DM Mono',monospace;}

  @media(max-width:560px){
    .method-row{flex-direction:column;}
    .pc-grid{grid-template-columns:1fr;}
    .feature-row{flex-direction:column;}
    .hero-inner{flex-direction:column;}
    .hero-arrow{transform:rotate(90deg);}
  }
</style>
</head>
<body>
<div id="app">
  <div class="kicker">RENTA FIJA 2026-I · UNIVERSIDAD DEL PACÍFICO</div>
  <h1 class="serif">Amortización de Préstamos y Bonos</h1>
  <p class="subtitle">Cómo los métodos de amortización se traducen en tipos de instrumentos de renta fija</p>

  <div class="method-row" id="methodRow"></div>
  <div class="view-tabs" id="viewTabs"></div>
  <div id="content" class="fade-in"></div>
  <div class="footer">Renta Fija 2026-I · Métodos de Amortización → Tipos de Bonos</div>
</div>

<script>
const METHODS = [
  {
    id:"ingles",
    method:"Método Inglés / Americano",
    bond:"Bullet Bond",
    bondSub:"Bono estándar / Plain Vanilla",
    color:"#6ab0e8",
    icon:"🏛️",
    description:"Solo paga cupones (intereses) durante su vida y devuelve el 100% del principal al vencimiento.",
    bondDesc:"Es el tipo de bono más común en mercados de capitales. Los bonos soberanos (US Treasury, Bono Peruano) y la mayoría de bonos corporativos siguen esta estructura.",
    examples:["Bonos del Tesoro Americano (T-Bonds)","Bonos Soberanos del Perú","Bonos corporativos investment grade","Eurobonos"],
    formula:"Cuota = Préstamo × i  (períodos 1 a n-1)\nCuota final = Préstamo × (1 + i)",
    cashflow:{
      label:"Flujo de caja (S/ 1,000 · 10% · 4 períodos)",
      periods:[1,2,3,4],
      interest:[100,100,100,100],
      principal:[0,0,0,1000]
    },
    keyFeature:"Principal 100% al vencimiento",
    prosCons:{
      pros:["Cupón predecible y constante","Máxima duración (más sensible a tasas)","Muy líquido en mercados secundarios"],
      cons:["Riesgo de refinanciamiento al vencimiento","Flujo de caja concentrado al final"]
    },
    durationNote:"La duración es máxima porque todo el principal llega al final. Mayor sensibilidad a cambios de tasa de interés.",
    investorNote:"Al valuar un bullet bond, el precio es el VP de los cupones periódicos MÁS el VP del valor par. Es la estructura que se trabaja en casi toda la valuación de bonos de Renta Fija."
  },
  {
    id:"aleman",
    method:"Método Alemán",
    bond:"Amortizing Bond",
    bondSub:"Bono con amortización constante",
    color:"#8ecfb0",
    icon:"📉",
    description:"Amortiza el mismo monto de capital en cada período. Los cupones van decreciendo porque el saldo disminuye.",
    bondDesc:"Utilizado en bonos de titulización de activos (ABS) y algunos bonos de infraestructura. Reduce el riesgo de refinanciamiento porque el emisor devuelve capital gradualmente.",
    examples:["Algunos Mortgage-Backed Securities (MBS)","Bonos de proyectos de infraestructura","Bonos Yankee de ciertos emisores LatAm","Titulizaciones de cartera de autos"],
    formula:"A = Préstamo / n  (constante)\nCuotaₖ = A + Saldo(k-1) × i",
    cashflow:{
      label:"Flujo de caja (S/ 1,000 · 10% · 4 períodos)",
      periods:[1,2,3,4],
      interest:[100,75,50,25],
      principal:[250,250,250,250]
    },
    keyFeature:"Amortización fija · Cuota decreciente",
    prosCons:{
      pros:["Menor riesgo de refinanciamiento","Duración más corta que bullet","Intereses totales pagados son menores"],
      cons:["Cuotas más altas al inicio","Menor liquidez en mercado secundario"]
    },
    durationNote:"Duración intermedia-baja. El capital se devuelve gradualmente, reduciendo la exposición a riesgo de tasa.",
    investorNote:"El factor de descuento se aplica a cada flujo individualmente porque los montos varían. No se puede usar directamente la fórmula de anualidad."
  },
  {
    id:"frances",
    method:"Método Francés",
    bond:"Pass-Through / Fully Amortizing",
    bondSub:"Bono hipotecario / Cuota constante",
    color:"#c9a96e",
    icon:"🏠",
    description:"Cuota total constante. El interés decrece y la amortización crece en cada período.",
    bondDesc:"Estructura típica de los bonos hipotecarios y los Mortgage-Backed Securities (MBS) residenciales. Cada pago incluye una porción creciente de capital.",
    examples:["Bonos hipotecarios (Cédulas hipotecarias)","Residential MBS (RMBS)","Bonos de consumo titulizados","Leasing financiero"],
    formula:"R = Préstamo × i / [1 − (1 + i)⁻ⁿ]\nAₖ = R − Saldo(k-1) × i",
    cashflow:{
      label:"Flujo de caja (S/ 1,000 · 10% · 4 períodos)",
      periods:[1,2,3,4],
      interest:[100.00,78.45,54.75,28.68],
      principal:[215.47,237.02,260.72,286.79]
    },
    keyFeature:"Cuota constante · Amortización creciente",
    prosCons:{
      pros:["Flujo de caja predecible para el inversor","Riesgo de refinanciamiento distribuido","Duración intermedia"],
      cons:["Riesgo de prepago (en MBS)","Cálculo más complejo","Cuota inicial mayor que bullet"]
    },
    durationNote:"Duración intermedia. La cuota constante genera un patrón de flujos equilibrado entre interés y principal.",
    investorNote:"Aunque la cuota es fija, la tasa interna de retorno (YTM) puede diferir de la tasa del cupón si el bono cotiza a descuento o prima."
  }
];

let activeId = "ingles";
let activeView = "overview";

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function fmt2(n){return n.toFixed(2);}

function renderMethodButtons(){
  const row=document.getElementById("methodRow");
  row.innerHTML="";
  METHODS.forEach(m=>{
    const btn=document.createElement("button");
    btn.className="method-btn"+(m.id===activeId?" active":"");
    btn.style.setProperty("--col",m.color);
    btn.style.setProperty("--col-bg",`rgba(${hexToRgb(m.color)},0.1)`);
    btn.innerHTML=`
      <div class="m-icon">${m.icon}</div>
      <div class="m-sub">${m.method.split(" ").slice(1).join(" ")}</div>
      <div class="m-bond">${m.bond}</div>
    `;
    if(m.id===activeId) btn.querySelector(".m-sub").style.color=m.color;
    btn.onclick=()=>{activeId=m.id;activeView="overview";render();};
    row.appendChild(btn);
  });
}

function renderViewTabs(m){
  const tabs=document.getElementById("viewTabs");
  tabs.innerHTML="";
  tabs.style.setProperty("--col",m.color);
  [["overview","Resumen"],["cashflow","Flujo de caja"],["detail","Mercado"]].forEach(([k,label])=>{
    const btn=document.createElement("button");
    btn.className="view-tab"+(activeView===k?" active":"");
    btn.textContent=label;
    btn.onclick=()=>{activeView=k;render();};
    tabs.appendChild(btn);
  });
}

function renderOverview(m){
  return `
    <!-- Hero link card -->
    <div class="hero-card" style="border:1px solid ${m.color}44;background:${m.color}12;">
      <div class="hero-inner">
        <div class="hero-col">
          <div class="hero-label" style="color:${m.color};">MÉTODO DE AMORTIZACIÓN</div>
          <div class="hero-name serif" style="color:${m.color};">${m.method}</div>
        </div>
        <div class="hero-arrow" style="color:${m.color};">→</div>
        <div class="hero-col">
          <div class="hero-label" style="color:${m.color};">INSTRUMENTO DE RENTA FIJA</div>
          <div class="hero-name serif" style="color:${m.color};">${m.bond}</div>
          <div class="hero-sub">${m.bondSub}</div>
        </div>
      </div>
      <div class="hero-note">${m.description}</div>
      <div class="hero-formula" style="color:${m.color};">${m.formula}</div>
    </div>

    <!-- Feature row -->
    <div class="feature-row">
      <div class="feature-box">
        <div class="card-title">CARACTERÍSTICA CLAVE</div>
        <div class="mono" style="font-size:15px;color:${m.color};">${m.keyFeature}</div>
      </div>
      <div class="feature-box">
        <div class="card-title">RIESGO PRINCIPAL</div>
        <div style="font-size:13px;color:#b0a898;">${m.prosCons.cons[0]}</div>
      </div>
    </div>

    <!-- Pros / Cons -->
    <div class="pc-grid">
      <div class="card">
        <div class="card-title" style="color:#8ecfb0;">✓ VENTAJAS</div>
        ${m.prosCons.pros.map((p,i)=>`<div class="pc-item" style="${i===m.prosCons.pros.length-1?'border:none':''}">${p}</div>`).join("")}
      </div>
      <div class="card">
        <div class="card-title" style="color:#e87a6a;">✗ LIMITACIONES</div>
        ${m.prosCons.cons.map((c,i)=>`<div class="pc-item" style="${i===m.prosCons.cons.length-1?'border:none':''}">${c}</div>`).join("")}
      </div>
    </div>
  `;
}

function renderCashflow(m){
  const cf=m.cashflow;
  const maxTotal=Math.max(...cf.periods.map((_,i)=>cf.interest[i]+cf.principal[i]))+50;
  let bars="";
  cf.periods.forEach((_,i)=>{
    const total=cf.interest[i]+cf.principal[i];
    const pctP=(cf.principal[i]/maxTotal)*100;
    const pctI=(cf.interest[i]/maxTotal)*100;
    bars+=`
      <div class="bar-wrap">
        <div class="bar-label-top">${Math.round(total)}</div>
        <div class="bar-container">
          <div class="bar-principal" style="height:${pctP}%;background:${m.color};opacity:0.9;"></div>
          <div class="bar-interest"  style="height:${pctI}%;background:${m.color};opacity:0.35;"></div>
        </div>
      </div>`;
  });

  let rows="";
  let runPrincipal=0;
  cf.periods.forEach((_,i)=>{
    runPrincipal+=cf.principal[i];
    const saldo=1000-runPrincipal;
    const total=cf.interest[i]+cf.principal[i];
    rows+=`<tr>
      <td>${i+1}</td>
      <td>${fmt2(cf.interest[i])}</td>
      <td>${fmt2(cf.principal[i])}</td>
      <td style="color:${m.color};font-weight:600;">${fmt2(total)}</td>
      <td>${fmt2(saldo)}</td>
    </tr>`;
  });
  const totI=cf.interest.reduce((a,b)=>a+b,0);
  const totT=cf.periods.reduce((a,_,i)=>a+cf.interest[i]+cf.principal[i],0);
  rows+=`<tr>
    <td style="color:#c9a96e;">TOTAL</td>
    <td style="color:#c9a96e;">${fmt2(totI)}</td>
    <td style="color:#c9a96e;">1,000.00</td>
    <td style="color:${m.color};font-weight:700;">${fmt2(totT)}</td>
    <td style="color:#c9a96e;">0.00</td>
  </tr>`;

  return `
    <div class="card">
      <div class="card-title">${cf.label}</div>
      <div class="bar-row">${bars}</div>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-swatch" style="background:${m.color};opacity:0.9;"></div>
          <span>Amortización (principal)</span>
        </div>
        <div class="legend-item">
          <div class="legend-swatch" style="background:${m.color};opacity:0.35;"></div>
          <span>Interés (cupón)</span>
        </div>
      </div>
      <div class="period-labels">
        ${cf.periods.map(p=>`<div class="period-label">t=${p}</div>`).join("")}
      </div>
      <table class="table-sm">
        <thead><tr>
          <th>Período</th><th>Interés</th><th>Amortización</th>
          <th style="color:${m.color};">Cuota total</th><th>Saldo</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div class="info-note" style="border:1px solid ${m.color}33;">
      <span class="info-note-label" style="color:${m.color};">DURACIÓN · </span>${m.durationNote}
    </div>
  `;
}

function renderDetail(m){
  const compRows=[
    {label:"Bullet",         cuota:"Constante (solo interés)",principal:"100% al vencimiento",dur:"Máxima",    liq:"Alta",      id:"ingles"},
    {label:"Amort. Constante",cuota:"Decreciente",             principal:"Cuotas iguales",    dur:"Media",     liq:"Media",     id:"aleman"},
    {label:"Cuota Fija",     cuota:"Constante (total)",        principal:"Creciente",         dur:"Media",     liq:"Media-Alta",id:"frances"},
  ];
  return `
    <div class="card">
      <div class="card-title">DESCRIPCIÓN EN MERCADO DE CAPITALES</div>
      <p style="font-size:14px;color:#b0a898;line-height:1.75;">${m.bondDesc}</p>
    </div>
    <div class="card">
      <div class="card-title">EJEMPLOS REALES</div>
      <div>
        ${m.examples.map(e=>`<span class="tag" style="background:${m.color}22;border:1px solid ${m.color}44;color:${m.color};">${e}</span>`).join("")}
      </div>
    </div>
    <div class="card">
      <div class="card-title">COMPARACIÓN CON OTROS MÉTODOS</div>
      <table class="table-sm">
        <thead><tr><th>Bono</th><th>Cuota</th><th>Principal</th><th>Duración</th><th>Liquidez</th></tr></thead>
        <tbody>
          ${compRows.map(r=>`
            <tr style="background:${r.id===activeId?m.color+'12':'transparent'}">
              <td style="color:${r.id===activeId?m.color:'#706860'};font-weight:${r.id===activeId?600:400};">
                ${r.id===activeId?"▶ ":""}${r.label}
              </td>
              <td>${r.cuota}</td><td>${r.principal}</td><td>${r.dur}</td><td>${r.liq}</td>
            </tr>`).join("")}
        </tbody>
      </table>
    </div>
    <div class="info-note" style="border:1px solid ${m.color}33;">
      <span class="info-note-label" style="color:${m.color};">NOTA PARA EL INVERSOR · </span>${m.investorNote}
    </div>
  `;
}

function render(){
  const m=METHODS.find(x=>x.id===activeId);
  renderMethodButtons();
  renderViewTabs(m);
  const content=document.getElementById("content");
  content.className="fade-in";
  // Reset animation
  void content.offsetWidth;
  content.className="fade-in";

  let html="";
  if(activeView==="overview") html=renderOverview(m);
  else if(activeView==="cashflow") html=renderCashflow(m);
  else html=renderDetail(m);

  content.innerHTML=html;
}

render();
</script>
</body>
</html>
